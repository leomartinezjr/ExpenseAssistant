name: ExpenseAssistant
options:
  bundleIdPrefix: com.leomartinez
targets:
  ExpenseAssistant:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ExpenseAssistant
    entitlements:
      path: ExpenseAssistant/ExpenseAssistant.entitlements
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    dependencies:
      - target: ExpenseWidget
    settings:
      SWIFT_VERSION: "6.0"
      OTHER_SWIFT_FLAGS: "-strict-concurrency=complete"
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_CFBundleDisplayName: "ExpenseAssistant"
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      INFOPLIST_KEY_GEMINI_API_KEY: "$(GEMINI_API_KEY)"
  ExpenseWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ExpenseWidget
      - path: ExpenseAssistant/Source/Models/Expense.swift
    entitlements:
      path: ExpenseWidget/ExpenseWidget.entitlements
    settings:
      SWIFT_VERSION: "6.0"
      PRODUCT_BUNDLE_IDENTIFIER: com.leomartinez.ExpenseAssistant.ExpenseWidget
      GENERATE_INFOPLIST_FILE: false
      INFOPLIST_FILE: ExpenseWidget/Info.plist
  ExpenseAssistantTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ExpenseAssistantTests
    dependencies:
      - target: ExpenseAssistant
    settings:
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: true

schemes:
  ExpenseAssistant:
    build:
      targets:
        ExpenseAssistant: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ExpenseAssistantTests
  ExpenseWidget:
    build:
      targets:
        ExpenseWidget: all
    run:
      config: Debug

